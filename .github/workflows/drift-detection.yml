##############################################################################
# Monitor: Drift Detection + MAE Continuous Training
#
# Consolidated from: drift-detection.yml + mae-continuous-training.yml
#
# Schedule: Every 6 hours (drift check) — adjustable via cron
# Flow: Check drift/MAE → if detected → call MLOps pipeline for retrain
#
# Manual: workflow_dispatch with configurable thresholds
##############################################################################

name: "Monitor: Drift Detection"

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      mae_threshold:
        description: "MAE threshold to trigger retrain"
        required: false
        default: "25"
        type: string
      window_hours:
        description: "Hours of data to evaluate"
        required: false
        default: "24"
        type: string

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ─────────────────────────────────────────────
  # Job 0: Preflight — verify Azure secrets exist
  # ─────────────────────────────────────────────
  preflight:
    name: "Preflight: Check Secrets"
    runs-on: ubuntu-latest
    outputs:
      azure_ready: ${{ steps.check.outputs.azure_ready }}
    steps:
      - id: check
        env:
          HAS_CLIENT: ${{ secrets.AZURE_CLIENT_ID }}
          HAS_TENANT: ${{ secrets.AZURE_TENANT_ID }}
          HAS_SUB: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          HAS_SQL: ${{ secrets.SQL_SERVER }}
        run: |
          missing=0
          for name in HAS_CLIENT HAS_TENANT HAS_SUB HAS_SQL; do
            if [ -z "${!name}" ]; then
              echo "::warning::Missing secret (mapped to $name) — skipping monitoring"
              missing=1
            fi
          done
          echo "azure_ready=$([ $missing -eq 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────
  # Job 1: Statistical drift detection (mlops/drift_detector.py)
  # ─────────────────────────────────────────────
  drift-check:
    name: Check Data & Model Drift
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.azure_ready == 'true'
    outputs:
      drift_detected: ${{ steps.drift.outputs.drift_detected }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install azure-ai-ml azure-identity scipy pyodbc

      - name: Run Drift Detection
        id: drift
        run: python mlops/drift_detector.py --output-github
        env:
          AML_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AML_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AML_WORKSPACE_NAME: ${{ secrets.AML_WORKSPACE_NAME }}
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USERNAME: ${{ secrets.SQL_USERNAME }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}

  # ─────────────────────────────────────────────
  # Job 2: MAE-based monitoring (ml/drift_monitor.py)
  # ─────────────────────────────────────────────
  mae-check:
    name: Check MAE Forecast Accuracy
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.azure_ready == 'true'
    outputs:
      mae_exceeded: ${{ steps.mae.outputs.mae_exceeded }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run MAE Monitor
        id: mae
        run: |
          python ml/drift_monitor.py \
            --threshold-mae ${{ inputs.mae_threshold || vars.DRIFT_MAE_ABS_THRESHOLD || '25' }} \
            --window-hours ${{ inputs.window_hours || vars.DRIFT_MONITOR_WINDOW_HOURS || '24' }} \
            --min-samples ${{ vars.DRIFT_MONITOR_MIN_SAMPLES || '24' }} \
            --trigger-mode none
          # Parse output to set GitHub output
          if [ -f ml/drift_results.json ]; then
            exceeded=$(python -c "import json; d=json.load(open('ml/drift_results.json')); print('true' if d.get('drift_detected') else 'false')")
            echo "mae_exceeded=$exceeded" >> "$GITHUB_OUTPUT"
          else
            echo "mae_exceeded=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USERNAME: ${{ secrets.SQL_USERNAME }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          KEY_VAULT_URI: ${{ secrets.KEY_VAULT_URI }}

  # ─────────────────────────────────────────────
  # Job 3: Auto-retrain if either check detected drift
  # ─────────────────────────────────────────────
  auto-retrain:
    name: Auto-Retrain (Drift Detected)
    needs: [preflight, drift-check, mae-check]
    if: |
      always() &&
      needs.preflight.outputs.azure_ready == 'true' &&
      (
        needs.drift-check.outputs.drift_detected == 'true' ||
        needs.mae-check.outputs.mae_exceeded == 'true'
      )
    uses: ./.github/workflows/ci-cd-mlops.yml
    with:
      force_retrain: true
    secrets: inherit
