##############################################################################
# Drift Detection — Scheduled Monitor + Auto-Retrain
#
# Schedule: Daily 2:00 AM UTC
# Flow: Check drift → if detected → call MLOps pipeline with force_retrain
#
# Fix: ci-cd-mlops.yml now supports workflow_call with force_retrain input
##############################################################################

name: "Monitor: Drift Detection"

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: "3.10"

jobs:
  drift-check:
    name: Check Data & Model Drift
    runs-on: ubuntu-latest
    outputs:
      drift_detected: ${{ steps.drift.outputs.drift_detected }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install azure-ai-ml azure-identity scipy pyodbc

      - name: Run Drift Detection
        id: drift
        run: python mlops/drift_detector.py --output-github
        env:
          AML_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AML_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AML_WORKSPACE_NAME: ${{ secrets.AML_WORKSPACE_NAME }}
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USERNAME: ${{ secrets.SQL_USERNAME }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}

  auto-retrain:
    name: Auto-Retrain (Drift Detected)
    needs: drift-check
    if: needs.drift-check.outputs.drift_detected == 'true'
    uses: ./.github/workflows/ci-cd-mlops.yml
    with:
      force_retrain: true
    secrets: inherit
