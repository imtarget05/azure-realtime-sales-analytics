name: "Monitor: MAE Continuous Training"

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: "3.10"

jobs:
  monitor-mae:
    name: Monitor MAE and Trigger Retrain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run MAE drift monitor
        run: |
          python ml/drift_monitor.py \
            --threshold-mae ${{ vars.DRIFT_MAE_ABS_THRESHOLD || '25' }} \
            --window-hours ${{ vars.DRIFT_MONITOR_WINDOW_HOURS || '24' }} \
            --min-samples ${{ vars.DRIFT_MONITOR_MIN_SAMPLES || '24' }} \
            --trigger-mode local
        env:
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USERNAME: ${{ secrets.SQL_USERNAME }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          KEY_VAULT_URI: ${{ secrets.KEY_VAULT_URI }}
          DRIFT_RETRAIN_SAMPLES: ${{ vars.DRIFT_RETRAIN_SAMPLES || '80000' }}
          DRIFT_RETRAIN_ESTIMATORS: ${{ vars.DRIFT_RETRAIN_ESTIMATORS || '300' }}
          DRIFT_RETRAIN_MAX_DEPTH: ${{ vars.DRIFT_RETRAIN_MAX_DEPTH || '6' }}
          DRIFT_RETRAIN_LEARNING_RATE: ${{ vars.DRIFT_RETRAIN_LEARNING_RATE || '0.1' }}
