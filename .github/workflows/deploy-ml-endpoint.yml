##############################################################################
# CD — Deploy ML Endpoint (standalone)
#
# Use this for quick model-only deploys without full pipeline.
# For full MLOps (train → register → deploy), use cd-mlops workflow.
##############################################################################

name: "CD: ML Endpoint (Quick Deploy)"

on:
  workflow_dispatch:
    inputs:
      model_version:
        description: "Model version to deploy (blank = latest)"
        required: false
        default: ""
        type: string

env:
  PYTHON_VERSION: "3.10"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install azure-ai-ml azure-identity

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy model
        env:
          AML_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AML_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AML_WORKSPACE_NAME: ${{ secrets.AML_WORKSPACE_NAME }}
        run: |
          ARGS="--cleanup"
          if [ -n "${{ inputs.model_version }}" ]; then
            ARGS="$ARGS --version ${{ inputs.model_version }}"
          else
            ARGS="$ARGS --use-latest"
          fi
          python mlops/deploy_to_endpoint.py $ARGS
