##############################################################################
# CD — Deploy Azure Functions (Validation Layer)
#
# Triggers: push to main (azure_functions/** changed) or manual
# Fix: functions-action@v2 does not exist → use v1
# Fix: Azure login requires all 3 OIDC params
##############################################################################

name: "CD: Azure Functions"

on:
  push:
    branches: [main]
    paths:
      - "azure_functions/**"
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: func-sales-validation-d9bt2m
  AZURE_FUNCTIONAPP_PACKAGE_PATH: azure_functions
  PYTHON_VERSION: "3.10"

permissions:
  id-token: write
  contents: read

jobs:
  preflight:
    name: "Preflight: Check Secrets"
    runs-on: ubuntu-latest
    outputs:
      azure_ready: ${{ steps.check.outputs.azure_ready }}
    steps:
      - id: check
        env:
          HAS_CLIENT: ${{ secrets.AZURE_CLIENT_ID }}
          HAS_TENANT: ${{ secrets.AZURE_TENANT_ID }}
          HAS_SUB: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          missing=0
          for name in HAS_CLIENT HAS_TENANT HAS_SUB; do
            if [ -z "${!name}" ]; then
              echo "::warning::Missing Azure secret (mapped to $name) — skipping deploy"
              missing=1
            fi
          done
          echo "azure_ready=$([ $missing -eq 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  deploy:
    name: Build & Deploy Functions
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.azure_ready == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: sudo apt-get install -y unixodbc-dev

      - name: Install dependencies into package
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Function App exists
        id: verify
        run: |
          if az functionapp show --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
             --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
             --query name -o tsv 2>/dev/null; then
            echo "app_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Function App '${{ env.AZURE_FUNCTIONAPP_NAME }}' not found or inaccessible — skipping deploy"
            echo "app_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure Function App settings
        if: steps.verify.outputs.app_exists == 'true'
        run: |
          az functionapp config appsettings set \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings "EVENT_HUB_NAME=sales-events" \
              "SCM_DO_BUILD_DURING_DEPLOYMENT=false" \
              "ENABLE_ORYX_BUILD=false" \
            --output none

      - name: Create deployment package
        if: steps.verify.outputs.app_exists == 'true'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          zip -r ../deploy.zip . -x "*.pyc" "__pycache__/*"

      - name: Deploy via zip push
        if: steps.verify.outputs.app_exists == 'true'
        run: |
          az functionapp deployment source config-zip \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --src deploy.zip
