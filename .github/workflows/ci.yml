##############################################################################
# CI — Lint, Validate & Test
#
# Runs on: every PR + push to main
# Purpose: Gate-keep code quality before any deployment
##############################################################################

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  # Shared flake8 config — single source of truth
  FLAKE8_ARGS: >-
    --max-line-length=120
    --ignore=E501,W503,E402,E226,E241,E231,E128,E127,E131,E221,E122,W504,W291,W292,W293,E302,E305,F401,F541,F841
    --exclude=.git,__pycache__,.github,node_modules,.venv,venv,databricks

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 . ${{ env.FLAKE8_ARGS }}

  validate:
    name: Validate Imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate config module
        run: python -c "from config.settings import PRODUCTS, STORE_IDS, REGIONS; print('Config OK')"

      - name: Validate core imports
        run: |
          python -c "
          import importlib, sys
          modules = [
              'config.settings',
              'data_generator.sales_generator',
              'monitoring.telemetry',
              'security.key_vault',
          ]
          failed = []
          for mod in modules:
              try:
                  importlib.import_module(mod)
                  print(f'  ✓ {mod}')
              except Exception as e:
                  print(f'  ✗ {mod}: {e}')
                  failed.append(mod)
          if failed:
              print(f'::warning::Failed imports: {failed}')
          "

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, validate]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          if [ -d "tests" ] && [ "$(find tests -name 'test_*.py' | head -1)" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No test files found — skipping"
          fi
