name: CI - Lint & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHON_VERSION: '3.10'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint
        run: flake8 . --max-line-length=120 --ignore=E501,W503,E402,E226,E241,E231,E128,E127,E131,E221,E122,W504,W291,W292,W293,E302,E305,F401,F541,F841 --exclude=.git,__pycache__,.github,node_modules,.venv,venv,databricks

      - name: Validate config module
        run: python -c "from config.settings import PRODUCTS, STORE_IDS, REGIONS; print('Config OK')"

      - name: Run benchmarks (dry run)
        run: |
          python -c "
          import importlib, sys
          for mod in ['config.settings', 'data_generator.sales_generator']:
              try:
                  importlib.import_module(mod)
                  print(f'  {mod}: OK')
              except Exception as e:
                  print(f'  {mod}: WARN - {e}')
          print('Import checks passed')
          "
