##############################################################################
# CD — Deploy Data Simulator to Azure Container Instance
#
# Triggers: push to main (data_generator/** or config/** changed)
# Fix: Use --secure-environment-variables for secrets
##############################################################################

name: "CD: Data Simulator"

on:
  push:
    branches: [main]
    paths:
      - "data_generator/**"
      - "config/**"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate Simulator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint
        run: flake8 data_generator/ --max-line-length=120 --ignore=E501,W503,E402,F401,W292,W291,W293

      - name: Validate config
        run: |
          python -c "from config.settings import PRODUCTS, STORE_IDS; print(f'OK: {len(PRODUCTS)} products, {len(STORE_IDS)} stores')"

  deploy:
    name: Deploy to Container Instance
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy simulator to Container Instance
        run: |
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name sales-simulator \
            --image python:3.10-slim \
            --cpu 1 --memory 1 \
            --restart-policy Always \
            --gitrepo-url https://github.com/${{ github.repository }}.git \
            --gitrepo-revision ${{ github.sha }} \
            --gitrepo-mount-path /mnt/repo \
            --secure-environment-variables \
              EVENT_HUB_CONNECTION_STRING='${{ secrets.EVENT_HUB_CONNECTION_STRING }}' \
            --environment-variables \
              EVENT_HUB_NAME='sales-events' \
            --command-line "/bin/bash -c 'cd /mnt/repo && pip install -r requirements.txt && python -m data_generator.sales_generator'" \
            --output table
