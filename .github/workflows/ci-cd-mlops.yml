##############################################################################
# CD — MLOps Pipeline (Infrastructure + Train + Deploy)
#
# Triggers:
#   - Push to main (terraform/ml/mlops paths): Terraform apply + retrain
#   - workflow_call: Called by drift-detection for auto-retrain
#   - workflow_dispatch: Manual trigger (retrain / deploy-only)
#
# Consolidates: deploy-ml-endpoint.yml (quick deploy via deploy_only flag)
##############################################################################

name: "CD: MLOps Pipeline"

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "ml/**"
      - "mlops/**"
  workflow_call:
    inputs:
      force_retrain:
        description: "Force ML model retraining"
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      force_retrain:
        description: "Force ML model retraining"
        required: false
        default: false
        type: boolean
      skip_terraform:
        description: "Skip Terraform apply"
        required: false
        default: false
        type: boolean
      deploy_only:
        description: "Skip training, deploy existing model"
        required: false
        default: false
        type: boolean
      model_version:
        description: "Model version to deploy (blank = latest)"
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_VERSION: "1.7.0"
  PYTHON_VERSION: "3.10"

jobs:
  # ─────────────────────────────────────────────
  # Stage 0: Preflight — verify Azure secrets exist
  # ─────────────────────────────────────────────
  preflight:
    name: "Preflight: Check Secrets"
    runs-on: ubuntu-latest
    outputs:
      azure_ready: ${{ steps.check.outputs.azure_ready }}
    steps:
      - id: check
        env:
          HAS_CLIENT: ${{ secrets.AZURE_CLIENT_ID }}
          HAS_TENANT: ${{ secrets.AZURE_TENANT_ID }}
          HAS_SUB: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          HAS_RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          HAS_AML: ${{ secrets.AML_WORKSPACE_NAME }}
        run: |
          missing=0
          for name in HAS_CLIENT HAS_TENANT HAS_SUB HAS_RG HAS_AML; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required Azure secret (mapped to $name)"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "azure_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "azure_ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Azure secrets missing — skipping cloud stages"
          fi

  # ─────────────────────────────────────────────
  # Stage 1: Infrastructure (Terraform)
  # ─────────────────────────────────────────────
  terraform:
    name: "Infra: Terraform"
    runs-on: ubuntu-latest
    needs: preflight
    if: |
      needs.preflight.outputs.azure_ready == 'true' &&
      github.event_name != 'workflow_call' &&
      inputs.skip_terraform != true &&
      inputs.deploy_only != true
    outputs:
      ml_workspace: ${{ steps.tf_output.outputs.ml_workspace_name }}
      resource_group: ${{ steps.tf_output.outputs.resource_group_name }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Plan
        run: |
          terraform plan -out=tfplan \
            -var="sql_admin_username=${{ secrets.SQL_ADMIN_USERNAME }}" \
            -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" \
            -var="environment=dev"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Export Outputs
        id: tf_output
        if: github.ref == 'refs/heads/main'
        run: |
          echo "ml_workspace_name=$(terraform output -raw ml_workspace_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────
  # Stage 2: ML Training Pipeline
  # ─────────────────────────────────────────────
  ml-retrain:
    name: "ML: Train & Register"
    runs-on: ubuntu-latest
    needs: [preflight, terraform]
    if: |
      always() &&
      needs.preflight.outputs.azure_ready == 'true' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      inputs.deploy_only != true
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install azure-ai-ml azure-identity

      - name: Trigger Training Pipeline
        run: python mlops/trigger_training_pipeline.py
        env:
          AML_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AML_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AML_WORKSPACE_NAME: ${{ secrets.AML_WORKSPACE_NAME }}

  # ─────────────────────────────────────────────
  # Stage 3: Deploy Model to Online Endpoint
  # ─────────────────────────────────────────────
  ml-deploy:
    name: "ML: Deploy Endpoint"
    runs-on: ubuntu-latest
    needs: [preflight, ml-retrain]
    if: |
      always() &&
      needs.preflight.outputs.azure_ready == 'true' &&
      (needs.ml-retrain.result == 'success' || inputs.deploy_only == true)
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install azure-ai-ml azure-identity

      - name: Deploy Model
        env:
          AML_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AML_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AML_WORKSPACE_NAME: ${{ secrets.AML_WORKSPACE_NAME }}
        run: |
          ARGS="--cleanup"
          if [ -n "${{ inputs.model_version }}" ]; then
            ARGS="$ARGS --version ${{ inputs.model_version }}"
          else
            ARGS="$ARGS --use-latest"
          fi
          python mlops/deploy_to_endpoint.py $ARGS
