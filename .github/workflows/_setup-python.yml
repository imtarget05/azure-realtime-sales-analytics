##############################################################################
# Reusable Workflow: Setup Python Environment
# Eliminates duplication across all workflows
##############################################################################

name: _setup-python

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        required: false
        default: "3.10"
        type: string
      install-requirements:
        description: "Install from requirements.txt"
        required: false
        default: true
        type: boolean
      extra-packages:
        description: "Space-separated extra pip packages"
        required: false
        default: ""
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install base dependencies
        if: inputs.install-requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install extra packages
        if: inputs.extra-packages != ''
        run: pip install ${{ inputs.extra-packages }}
